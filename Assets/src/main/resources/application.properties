spring.application.name=Assets
server.port=10000

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/keyed}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:keyed_secure}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
# ?? JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ?? Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
# ── Multipart (загрузка файлов) ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ── Auth ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:KeyedVaultDevSecretChangeMeInProduction32Chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── AI Engine URL ─────────────────────────────────────────────────────────────
ai.engine.url=${AI_ENGINE_URL:http://localhost:8001}

# ── Tomcat: не обрывать долгие AI-запросы (Claude ~90-150 сек) ───────────────
server.tomcat.connection-timeout=200000
spring.mvc.async.request-timeout=200000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.Assets=INFO
logging.level.org.springframework.security=WARN
